<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Providence Memorial Park</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/providence.css">
</head>
<body class="login-page">

  <div class="login-card">

    <!-- Brand -->
    <div class="login-brand">
      <div class="login-brand-icon"><i class="bi bi-geo-alt-fill"></i></div>
      <div>
        <span class="login-brand-name">Providence Memorial Park</span>
        <span class="login-brand-tag">A Place of Peace and Remembrance</span>
      </div>
    </div>

    <!-- Header -->
    <div class="login-header">
      <h2>Welcome Back</h2>
      <p>Sign in to your account to continue.</p>
    </div>

    <!-- Error message (hidden by default, shown by JS on failed login) -->
    <div class="login-error" id="loginError">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span id="errorMessage">Invalid email or password. Please try again.</span>
    </div>

    <!-- Form -->
    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="emailInput"><i class="bi bi-envelope"></i> Email Address</label>
        <input type="email" id="emailInput" placeholder="Enter your email" required>
        <div class="field-error">Please enter a valid email address.</div>
      </div>

      <div class="form-group">
        <label for="passwordInput"><i class="bi bi-lock"></i> Password</label>
        <div class="pass-wrapper">
          <input type="password" id="passwordInput" placeholder="Enter your password" required>
          <button type="button" class="pass-eye" id="togglePass"><i class="bi bi-eye"></i></button>
        </div>
        <div class="field-error">Password is required.</div>
      </div>

      <button type="submit" class="btn-login" id="submitBtn">
        <span class="btn-login-text">Sign In</span>
        <span class="btn-login-loading" id="btnLoading"><i class="bi bi-arrow-repeat spin"></i> Signing in...</span>
      </button>
    </form>

    <!-- Links -->
    <p class="register-text">
      Don't have an account? <a href="registerAccount.html">Create one</a>
    </p>
    <a href="../landingPage/index.html" class="back-link"><i class="bi bi-arrow-left"></i> Back to Home</a>
  </div>

  <script>
    /* ══ LOGIN SCRIPT ═════════════════════════════════════
       Single login for all users.
       The backend determines the role (admin/staff/client)
       based on credentials and redirects accordingly.
       ═══════════════════════════════════════════════════ */

    const loginForm     = document.getElementById('loginForm');
    const emailInput    = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const submitBtn     = document.getElementById('submitBtn');
    const loginError    = document.getElementById('loginError');
    const errorMessage  = document.getElementById('errorMessage');
    const togglePass    = document.getElementById('togglePass');

    /* ── Password toggle ──────────────────────────────── */
    togglePass.addEventListener('click', () => {
      const isHidden = passwordInput.type === 'password';
      passwordInput.type = isHidden ? 'text' : 'password';
      togglePass.querySelector('i').className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
    });

    /* ── Clear errors on input ────────────────────────── */
    [emailInput, passwordInput].forEach(el => {
      el.addEventListener('input', () => {
        el.classList.remove('invalid');
        loginError.classList.remove('show');
      });
    });

    /* ── Form submit (frontend validation only) ─────── */
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      loginError.classList.remove('show');

      /* Client-side validation */
      let valid = true;

      if (!emailInput.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value)) {
        emailInput.classList.add('invalid');
        valid = false;
      }

      if (!passwordInput.value) {
        passwordInput.classList.add('invalid');
        valid = false;
      }

      if (!valid) return;

      /* ─────────────────────────────────────────────────
         TODO: Add backend authentication here later.
         
         Example using fetch():

         fetch('your-api-endpoint/login.php', {
           method: 'POST',
           headers: { 'Content-Type': 'application/json' },
           body: JSON.stringify({
             email: emailInput.value,
             password: passwordInput.value
           })
         })
         .then(res => res.json())
         .then(data => {
           if (data.success) {
             // Redirect based on role from database
             if (data.role === 'admin') window.location.href = 'admin/dashboard.html';
             else window.location.href = 'user/dashboard.html';
           } else {
             errorMessage.textContent = data.message;
             loginError.classList.add('show');
           }
         });
         ───────────────────────────────────────────────── */

      alert('Login form is ready. Backend authentication will be connected to the database.');
    });
  </script>

</body>
</html>
